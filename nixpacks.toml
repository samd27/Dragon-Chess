[phases.setup]
nixPkgs = ['curl', 'go', 'nodejs', 'php82', 'php82Packages.composer', 'php82Extensions.bcmath']

[phases.install]
cmds = [
    'curl -fsSL -o /tmp/grpcurl.tar.gz https://github.com/fullstorydev/grpcurl/releases/download/v1.9.3/grpcurl_1.9.3_linux_x86_64.tar.gz',
    'tar -xzf /tmp/grpcurl.tar.gz -C /usr/local/bin grpcurl',
    'chmod +x /usr/local/bin/grpcurl',
    'composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-bcmath',
    'npm ci',
    'npm run build'
]

[phases.build]
cmds = [
    'php artisan config:clear',
    'php artisan cache:clear',
    'php artisan view:clear',
    'php artisan route:clear',
    'php artisan migrate --force'
]

[start]
cmd = 'php artisan serve --host=0.0.0.0 --port=$PORT'
